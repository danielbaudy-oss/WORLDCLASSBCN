<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WorldClass">
  <meta name="theme-color" content="#092b50">
  <link rel="apple-touch-icon" href="https://i.ibb.co/93tykMkW/logo-1.png">
  <link rel="icon" type="image/png" href="https://i.ibb.co/93tykMkW/logo-1.png">
  <title>WorldClass BCN - Iniciar Sesión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Google Sans', Arial, sans-serif;
      background: linear-gradient(135deg, #092b50 0%, #59d2ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 50px 40px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 80px rgba(9, 43, 80, 0.4);
    }
    .logo { width: 80px; height: auto; margin-bottom: 20px; border-radius: 12px; }
    h1 { color: #092b50; font-size: 24px; margin-bottom: 10px; }
    .subtitle { color: #64748b; margin-bottom: 30px; font-size: 14px; line-height: 1.6; }
    .google-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 32px;
      background: #fff;
      border: 2px solid #4285f4;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: #092b50;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      max-width: 300px;
    }
    .google-btn:hover {
      background: #4285f4;
      color: white;
      box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4);
    }
    .google-icon { width: 24px; height: 24px; }
    .loading-state { display: none; }
    .loading-state.active { display: block; }
    .login-state.hidden { display: none; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #e2e8f0;
      border-top-color: #59d2ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-msg { color: #64748b; font-size: 14px; margin-top: 10px; }
    .pending-msg {
      background: #fef3c7;
      border: 2px solid #f59e0b;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      display: none;
    }
    .pending-msg h3 { color: #92400e; margin-bottom: 8px; }
    .pending-msg p { color: #b45309; font-size: 13px; }
    .role-selection { display: none; }
    .role-btn {
      display: block;
      width: 100%;
      padding: 20px;
      margin: 10px 0;
      border: 2px solid #e0e7ff;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
    }
    .role-btn:hover {
      border-color: #59d2ff;
      background: #f0f9ff;
      transform: translateY(-2px);
    }
    .role-icon { font-size: 32px; margin-bottom: 10px; }
    .role-title { font-size: 18px; font-weight: 700; color: #092b50; }
    .role-desc { font-size: 14px; color: #64748b; margin-top: 5px; }
    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #092b50; color: #fff;
      padding: 14px 28px; border-radius: 14px;
      font-weight: 600; font-size: 14px; z-index: 2000;
      opacity: 0; transition: all 0.3s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://i0.wp.com/worldclassbcn.com/wp-content/uploads/2025/05/worldclass_logo.png?fit=368%2C396&ssl=1"
         alt="WorldClass BCN" class="logo"
         onerror="this.style.display='none'">

    <!-- Login State -->
    <div id="loginState" class="login-state">
      <h1>Iniciar Sesión</h1>
      <p class="subtitle">Accede al sistema de fichaje de WorldClass BCN con tu cuenta de Google.</p>
      <button class="google-btn" onclick="signInWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <p class="status-msg">Verificando sesión...</p>
    </div>

    <!-- Pending Approval -->
    <div id="pendingState" class="pending-msg">
      <h3>⏳ Cuenta Pendiente</h3>
      <p>Tu cuenta ha sido creada pero necesita ser activada por un administrador. Contacta al equipo de WorldClass BCN.</p>
      <button class="google-btn" style="margin-top:16px;max-width:100%" onclick="signOut()">Cerrar Sesión</button>
    </div>

    <!-- Role Selection (admin who is also a teacher) -->
    <div id="roleSelection" class="role-selection">
      <h1 id="welcomeName">👋 ¡Hola!</h1>
      <p class="subtitle">Elige tu panel</p>
      <button class="role-btn" onclick="goTo('teacher.html')">
        <div class="role-icon">🕐</div>
        <div class="role-title">Fichaje de Empleado</div>
        <div class="role-desc">Fichar entrada/salida y ver tus horas</div>
      </button>
      <button class="role-btn" onclick="goTo('admin.html')">
        <div class="role-icon">📊</div>
        <div class="role-title">Panel de Administración</div>
        <div class="role-desc">Ver todos los empleados y gestionar fichajes</div>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var V = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? '?v=' + Date.now() : '';
    document.write('<script src="js/supabase-config.js'+V+'"><\/script><script src="js/auth.js'+V+'"><\/script>');
  </script>
  <script>
    function goTo(page) { window.location.href = page; }

    async function init() {
      const loginState = document.getElementById('loginState');
      const loadingState = document.getElementById('loadingState');
      const pendingState = document.getElementById('pendingState');
      const roleSelection = document.getElementById('roleSelection');

      // Check for OAuth errors in URL
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      const error = params.get('error') || hashParams.get('error');
      const errorDesc = params.get('error_description') || hashParams.get('error_description');
      if (error) {
        console.error('OAuth error:', error, errorDesc);
        loginState.classList.remove('hidden');
        loginState.innerHTML += '<div style="background:#fee2e2;border:2px solid #ef4444;border-radius:12px;padding:16px;margin-top:20px;text-align:left"><strong style="color:#991b1b">Error: ' + error + '</strong><p style="color:#991b1b;font-size:12px;margin-top:4px">' + (errorDesc || '') + '</p></div>';
        return;
      }

      // Show loading while checking session
      loginState.classList.add('hidden');
      loadingState.classList.add('active');

      const session = await getSession();

      if (!session) {
        loadingState.classList.remove('active');
        loginState.classList.remove('hidden');
        return;
      }

      const profile = await getProfile();
      loadingState.classList.remove('active');

      if (!profile || profile.status === 'Pending') {
        pendingState.style.display = 'block';
        return;
      }

      if (profile.status === 'Inactive') {
        pendingState.style.display = 'block';
        pendingState.querySelector('h3').textContent = '🔒 Cuenta Desactivada';
        pendingState.querySelector('p').textContent = 'Tu cuenta ha sido desactivada. Contacta al administrador.';
        return;
      }

      // Active user - route based on role
      initDevRoleSwitcher(profile);
      if (profile.role === 'admin' || profile.role === 'super_admin') {
        document.getElementById('welcomeName').textContent = '👋 ¡Hola, ' + profile.name + '!';
        roleSelection.style.display = 'block';
      } else {
        window.location.href = 'teacher.html';
      }
    }

    init();
  </script>
</body>
</html>
